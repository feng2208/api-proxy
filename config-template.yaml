listen: "0.0.0.0:3000"
max_body_size: 10485760  # 10MB, 0 means no limit
base_path: "/v1"

# Client authentication keys
client_rate_limit: 10
api_keys:
  - dssssssssssssssss
  - bxxxxxxxxxxxxx

# Global proxy (optional)
#proxy:
#  url: socks5://127.0.0.1:1080
#  url: http://127.0.0.1:8080

models:
  - name: gemini-flash-lite
    providers:
      - name: gemini
        upstream: https://generativelanguage.googleapis.com/v1beta/openai/v1
        model: gemini-2.5-flash-lite
        model_rate_limit: 10
        timeout: 30s
        #proxy:
        #  url: socks5://127.0.0.1:1080

auth:
  providers:
    - name: gemini
      #rate_limit: 10
      keys:
        - AIaaaaaaaaaaaaaaaaaaaa
